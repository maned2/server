services:
  eco-game-server:
    container_name: eco-game-server
    image: strangeloopgames/eco-game-server:latest
    restart: always
    environment:
      - LD_LIBRARY_PATH=/app
      - ECO_SERVER_TOKEN=${ECO_SERVER_TOKEN}
    command: ["./EcoServer", "--nogui", "--userToken=${ECO_SERVER_TOKEN}"]
    # command: ["./EcoServer", "--nogui", "--offline"]
    volumes:
      - ./mount/Storage/:/app/Storage/
      - ./mount/Configs/:/app/Configs/
      - ./mount/Logs/:/app/Logs/
    ports:
      - "3000:3000/udp"
      - "3001:3001/tcp"
